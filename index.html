<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio do Amor ❤️</title>
    <style>
        :root { 
            --rosa: #ff85a1;      /* Rosa vibrante mas elegante */
            --vermelho: #c62828;  /* Vermelho paixão */
            --vinho: #880e4f;     /* Vinho para contraste */
            --branco: #ffffff;
            --fundo: #fdfcfc;     /* Quase branco */
        }
        
        body { background-color: var(--fundo); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        
        .card { 
            background: var(--branco); 
            padding: 35px; 
            border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            border: 1px solid #f0f0f0;
            position: relative;
        }

        /* Coraçãozinho flutuante no topo */
        .card::before { content: '❤️'; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 2rem; background: var(--branco); border-radius: 50%; padding: 5px; }

        h1 { color: var(--vinho); margin-bottom: 5px; font-size: 1.8rem; }
        .sub { color: #888; margin-bottom: 25px; font-size: 0.95rem; }

        .questao { 
            background: #fffafa; 
            padding: 25px; 
            border-radius: 15px; 
            text-align: left; 
            font-family: 'Times New Roman', serif; 
            margin-bottom: 20px; 
            border: 1px solid #ffebee;
            border-left: 6px solid var(--vermelho); 
            color: #333; 
            font-size: 1.1rem;
        }

        input { 
            width: 90%; 
            padding: 15px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            margin-bottom: 20px; 
            transition: 0.3s;
        }

        input:focus { border-color: var(--rosa); outline: none; box-shadow: 0 0 10px rgba(255, 133, 161, 0.2); }

        button { 
            background: linear-gradient(45deg, var(--rosa), var(--vermelho)); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 1.1rem; 
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(198, 40, 40, 0.2);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(198, 40, 40, 0.3); filter: brightness(1.1); }

        .msg-amor { 
            color: #444; 
            line-height: 1.8; 
            margin: 20px 0; 
            white-space: pre-line; 
            font-size: 1.1rem; 
            text-align: left; 
            background: #fff9fa;
            padding: 20px;
            border-radius: 15px;
        }

        .slider-container { width: 100%; margin: 20px auto; overflow: hidden; border-radius: 20px; display: none; background: #000; position: relative; }
        .slides { display: flex; transition: transform 0.5s ease-in-out; }
        .slides img { width: 100%; flex-shrink: 0; object-fit: contain; max-height: 400px; }
        
        .seta { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.7); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; font-weight: bold; color: var(--vermelho); }
        .seta-esq { left: 10px; }
        .seta-dir { right: 10px; }

        .hidden { display: none; }
        #feedback { margin-bottom: 15px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
    <div id="conteudo">
        <h1>Desafio Matemático ❤️</h1>
        <p class="sub">Prove que você é bom de conta e de coração!</p>
        
        <div id="area-pergunta">
            <div class="questao" id="texto-questao">Carregando...</div>
            <input type="text" id="input-resp" placeholder="Sua resposta...">
            <div id="feedback"></div>
            <button onclick="verificar()">Desbloquear Fase</button>
        </div>

        <div id="area-recompensa" class="hidden">
            <h2 id="msg-topo" style="color: var(--vermelho);"></h2>
            <div class="msg-amor" id="corpo-texto"></div>
            
            <div class="slider-container" id="slider">
                <button class="seta seta-esq" onclick="mudarSlide(-1)">❮</button>
                <div class="slides" id="slides-wrapper"></div>
                <button class="seta seta-dir" onclick="mudarSlide(1)">❯</button>
            </div>
            <div id="cont-fotos" style="font-size: 0.8rem; color: #999; margin-bottom: 15px;"></div>

            <button onclick="proxima()">Próxima fase ➔</button>
        </div>
    </div>
</div>

<script>
    const fases = [
        {
            titulo: "Fase 1: EsPCEx",
            pergunta: "Determine o valor de x que satisfaz a equação:\nlog₂(x - 3) + log₂(x + 3) = log₂ 7",
            res: "4",
            acerto: "A matemática não mente: você é o melhor! ❤️",
            erro: "Quase lá, meu amor! Tenta de novo.",
            texto: "24/04/2019 ❤️ \nFoi o dia que você me escolheu. O dia em que me tornei a mulher mais feliz do mundo. O dia que ficará marcado para sempre na nossa história como o início de tudo! \nVocê me escolheu, e eu te escolho todo dia, meu amor!",
            fotos: ["foto1.jpg"]
        },
        {
            titulo: "Fase 2: Barro Branco",
            pergunta: "Uma urna contém 5 bolas brancas e 3 pretas. Se retirarmos 3 bolas ao acaso, sem reposição, qual a probabilidade de saírem exatamente 2 bolas brancas? (Ex: 15/28)",
            res: "15/28",
            acerto: "Certo! Minha probabilidade de te amar é 100%!",
            erro: "Eita! Tenta de novo que você consegue!",
            texto: "Foram 7 anos de muito amor, mas é muito bom relembrar as coisas boas que passamos juntos! Nem tudo foi um mar de rosas, mas estamos aqui hoje, firmes e fortes, nos amando cada dia mais.",
            fotos: ["historia1.jpg", "historia2.jpg", "historia3.jpg", "historia4.jpg", "historia5.jpg", "historia6.jpg", "historia7.jpg", "historia8.jpg"]
        },
        {
            titulo: "Fase 3: Lógica",
            pergunta: "Determine o valor de k para que o sistema:\n{ 2x + y = 5\n{ x - 3y = -8\nsatisfaça k = x + y.",
            res: "4",
            acerto: "Perfeito! Você é demais! ❤️",
            erro: "Verifique as contas, bebê!",
            texto: "Se lembra disso?",
            fotos: ["cruzadinha.jpg"]
        },
        {
            titulo: "Fase 4: EFOMM",
            pergunta: "Calcule o limite:\nlim (x→0) [ (sen 5x) / (3x) ]\n(Responda em fração, ex: 5/3)",
            res: "5/3",
            acerto: "Limite superado! Você é incrível!",
            erro: "Cuidado com o limite! Tenta de novo.",
            texto: "Esse foi o dia mais importante da minha vida! O dia que você me escolheu para passar o resto da vida ao meu lado! Agradeço por tudo que você fez por mim, nossa viagem, o seu pedido.. me senti muito amada!",
            fotos: ["pedido1.jpg", "pedido2.jpg", "pedido3.jpg", "pedido4.jpg", "pedido5.jpg", "pedido6.jpg"]
        },
        {
            titulo: "Fase Final: Escola Naval",
            pergunta: "Para o prêmio final:\nDetermine ∫ de 0 a π/2 de (sen x / (sen x + cos x)) dx. (Ex: pi/4)",
            res: "pi/4",
            acerto: "Você venceu o desafio final! ❤️",
            erro: "Falta pouco! Não desista agora.",
            texto: "Sabe o que é o amor?\nNa ciência, pode ser química... mas pra mim, amor é você. ❤️ \nEspero que tenha gostado dessa pequena surpresa!",
            fotos: ["final1.jpg", "final2.jpg", "final3.jpg", "final4.jpg"]
        }
    ];

    let atual = 0;
    let sIdx = 0;

    function init() {
        document.getElementById("texto-questao").innerText = fases[atual].pergunta;
        document.getElementById("area-pergunta").classList.remove("hidden");
        document.getElementById("area-recompensa").classList.add("hidden");
        document.getElementById("feedback").innerText = "";
        document.getElementById("input-resp").value = "";
    }

    window.verificar = function() {
        const r = document.getElementById("input-resp").value.trim().toLowerCase();
        const f = document.getElementById("feedback");
        if(r === fases[atual].res.toLowerCase()) {
            document.getElementById("area-pergunta").classList.add("hidden");
            document.getElementById("area-recompensa").classList.remove("hidden");
            document.getElementById("msg-topo").innerText = fases[atual].acerto;
            document.getElementById("corpo-texto").innerText = fases[atual].texto;
            
            const w = document.getElementById("slides-wrapper");
            w.innerHTML = "";
            fases[atual].fotos.forEach(imgSrc => {
                const i = document.createElement("img");
                i.src = imgSrc;
                w.appendChild(i);
            });
            sIdx = 0;
            document.getElementById("slider").style.display = "block";
            updSlider();
        } else {
            f.innerText = fases[atual].erro;
            f.style.color = var(--vermelho);
        }
    }

    window.mudarSlide = function(n) {
        sIdx += n;
        const total = fases[atual].fotos.length;
        if (sIdx >= total) sIdx = 0;
        if (sIdx < 0) sIdx = total - 1;
        updSlider();
    }

    function updSlider() {
        const w = document.getElementById("slides-wrapper");
        w.style.transform = translateX(${-sIdx * 100}%);
        document.getElementById("cont-fotos").innerText = Imagem ${sIdx + 1} de ${fases[atual].fotos.length};
        document.querySelectorAll('.seta').forEach(s => s.style.display = fases[atual].fotos.length > 1 ? "flex" : "none");
    }

    window.proxima = function() {
        atual++;
        if(atual < fases.length) init();
        else document.querySelector(".card").innerHTML = "<h1>Feliz Aniversário de 7 Anos! ❤️</h1><p>Eu te amo infinitamente!</p>";
    }

    init();
</script>
</body>
</html>
